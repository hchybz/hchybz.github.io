<header class="sticky top-0 z-50 bg-white shadow-md">
    <div class="flex items-center justify-between px-4 py-3 md:px-6">
        <!-- Logo -->
        <div class="flex items-center">
            <a href="{{ "/" | relLangURL }}">
                <img src="{{ "logo.png" | relURL }}" alt="{{ site.Title }}" class="h-16">
            </a>
        </div>

        <div class="flex items-center space-x-4">
            <!-- Language Switcher -->
            {{ if hugo.IsMultilingual }}
            <div class="flex items-center space-x-2">
                {{ $currentLang := .Lang }}
                {{ range .Translations }}
                    <a href="{{ .RelPermalink }}" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-blue-600 hover:bg-blue-50 transition-colors">
                        {{ .Language.LanguageName }}
                    </a>
                {{ end }}
                <span class="px-3 py-1.5 rounded-md text-sm font-medium bg-blue-600 text-white">
                    {{ .Language.LanguageName }}
                </span>
            </div>
            {{ end }}

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </div>
</header>
