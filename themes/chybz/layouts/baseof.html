<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" class="h-full">
<head>
  {{ partial "head.html" . }}
</head>
<body class="bg-gray-50 h-full flex flex-col">
  {{ partial "header.html" . }}

  <div class="flex flex-1">
    {{ partial "sidebar.html" . }}

    <main class="flex-1 md:ml-64 p-4 md:p-6">
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  {{ partial "footer.html" . }}
  {{ partial "scripts.html" . }}
</body>
</html>
