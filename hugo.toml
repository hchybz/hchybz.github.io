baseURL = 'https://chybz.art/'
title = 'Mon Blog Personnel'
theme = 'chybz'
defaultContentLanguage = 'fr'

[languages]
  [languages.en]
    languageCode = 'en'
    languageName = 'English'
    weight = 2
    contentDir = 'content/en'
    title = 'My Personal Blog'

    [languages.en.params]
      description = 'A personal blog about technology and more'

    [[languages.en.menu.main]]
      name = 'About'
      url = '/en/about/'
      weight = 10

    [[languages.en.menu.main]]
      name = 'Posts'
      url = '/en/posts/'
      weight = 20

  [languages.fr]
    languageCode = 'fr'
    languageName = 'Français'
    weight = 1
    contentDir = 'content/fr'
    title = 'Mon Blog Personnel'

    [languages.fr.params]
      description = 'Un blog personnel sur la technologie et plus'

    [[languages.fr.menu.main]]
      name = 'À Propos'
      url = '/fr/about/'
      weight = 10

    [[languages.fr.menu.main]]
      name = 'Articles'
      url = '/fr/posts/'
      weight = 20

[params]
  author = 'Herve'
  linkedin = 'chybzart'
  instagram = 'chybzart'
  goatcounter = 'chybzart'
  color = 'linen'

  # Category badge colors for date menu
  [params.categoryColors]
    [params.categoryColors.IT]
      bg = 'bg-blue-100'
      text = 'text-blue-700'
    [params.categoryColors.NonIT]
      bg = 'bg-green-100'
      text = 'text-green-700'
    [params.categoryColors.Projects]
      bg = 'bg-purple-100'
      text = 'text-purple-700'

[taxonomies]
  category = 'categories'
  tag = 'tags'
